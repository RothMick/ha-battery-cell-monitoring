type: custom:ha-battery-cell-monitoring
title: Cell voltage analysis
warn_thresholds:   # status badge colors
  watch: 20        # mV - yellow
  balance: 50      # mV - orange
  critical: 200    # mV - red
warn_levels:       # warning banner
  balancing: 100   # mV - "Perform balancing"
  deactivate: 350  # mV - "Deactivate battery"
batteries:
  - id: 1234
    name: B2500 1234 (West)
    entity_prefix: hame_energy_hmj_2_abcdefgh1234_cell_voltage_host_  # "sensor." is added automatically
    cell_count: 14
    digits: 2
    # optional template sensors (computed from cells when omitted)
    spread: sensor.b2500_1234_cell_voltage_spread
    min: sensor.b2500_1234_cell_voltage_min
    max: sensor.b2500_1234_cell_voltage_max
    mean: sensor.b2500_1234_cell_voltage_mean
    # display options (all default true)
    show_status: true
    show_chart: true
    show_stats: true
    show_peak: true
  - id: 4321
    name: B2500 4321 (Ost)
    entity_prefix: hame_energy_hmj_2_hgfedcba4321_cell_voltage_host_
    cell_count: 14
    digits: 2
    spread: sensor.b2500_4321_cell_voltage_spread
    min: sensor.b2500_4321_cell_voltage_min
    max: sensor.b2500_4321_cell_voltage_max
    mean: sensor.b2500_4321_cell_voltage_mean
