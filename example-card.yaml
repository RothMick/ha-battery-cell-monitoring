type: custom:ha-battery-cell-monitoring
title: Zellspannungsanalyse
warn_thresholds:
  watch: 20      # mV — gelb
  balance: 50    # mV — orange
  critical: 200  # mV — rot
batteries:
  - id: 1234
    name: B2500 1234 (West)
    entity_prefix: sensor.hame_energy_hmj_2_abcdefgh1234_cell_voltage_host_
    cell_count: 14
    digits: 2
    # optional: Template-Sensoren (sonst werden Werte aus den Zellen berechnet)
    spread: sensor.b2500_1234_cell_voltage_spread
    min: sensor.b2500_1234_cell_voltage_min
    max: sensor.b2500_1234_cell_voltage_max
    mean: sensor.b2500_1234_cell_voltage_mean
    # Anzeige-Optionen (alle default true)
    show_status: true   # farbiges Zustand-Badge oben rechts
    show_chart: true    # Zellen-Balkendiagramm
    show_stats: true    # Min/Mean/Max/Spread-Zeile
    show_peak: true     # Peak-Spread mit Timestamp + Reset
  - id: 4321
    name: B2500 4321 (Ost)
    entity_prefix: sensor.hame_energy_hmj_2_hgfedcba4321_cell_voltage_host_
    cell_count: 14
    digits: 2
    spread: sensor.b2500_4321_cell_voltage_spread
    min: sensor.b2500_4321_cell_voltage_min
    max: sensor.b2500_4321_cell_voltage_max
    mean: sensor.b2500_4321_cell_voltage_mean
